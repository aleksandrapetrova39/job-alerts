name: Job Alert Check (Daily / Serper)

on:
  schedule:
    # once a day at 07:00 UTC
    - cron: "0 7 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check-jobs-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run job alert script (daily group)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          SCHEDULE_GROUP: daily
        run: python job_alerts.py

      - name: Commit updated state
        run: |
          git config user.name "job-alert-bot"
          git config user.email "actions@github.com"
          git add seen_jobs_daily.json
          git diff --staged --quiet || git commit -m "Update daily seen jobs state"
          git push
